name: Attach PR to Trello Cards

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_url:
        description: PR URL
        required: true
      pr_title:
        description: PR title (include [CC-N] keys)
        required: true
      pr_body:
        description: PR body
        required: false

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Trello card IDs and attach PR
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.inputs.pr_url }}
          PR_TITLE: ${{ github.event.pull_request.title || github.event.inputs.pr_title }}
          PR_BODY: ${{ github.event.pull_request.body || github.event.inputs.pr_body }}
        run: |
          COMBINED="$PR_TITLE $PR_BODY"
          CC_KEYS=$(echo "$COMBINED" | grep -oP '(?<=\[)[^\]]+(?=\])' | tr ',' '\n' | tr -d ' ' | grep -E '^CC-[0-9]+$' || true)

          if [ -z "$CC_KEYS" ]; then
            echo "No CC-N keys found — skipping."
            exit 0
          fi

          echo "Key length: ${#TRELLO_API_KEY}, Token length: ${#TRELLO_TOKEN}"
          BOARD_CARDS=$(curl -s "https://api.trello.com/1/boards/$TRELLO_BOARD_ID/cards?key=$TRELLO_API_KEY&token=$TRELLO_TOKEN&fields=name,shortLink")
          echo "Board cards response (first 200 chars): ${BOARD_CARDS:0:200}"

          cat > /tmp/find_card.py << 'EOF'
          import sys, json, re
          cards = json.load(sys.stdin)
          key = sys.argv[1]
          for c in cards:
              if re.match(r'^' + re.escape(key) + r'(\b|:|$)', c['name']):
                  print(c['shortLink'])
                  break
          EOF

          for KEY in $CC_KEYS; do
            echo "Looking up card for: $KEY"
            SHORT_LINK=$(echo "$BOARD_CARDS" | python3 /tmp/find_card.py "$KEY" 2>/dev/null || true)

            if [ -z "$SHORT_LINK" ]; then
              echo "  → Card not found for $KEY, skipping"
              continue
            fi

            echo "  → Found shortLink: $SHORT_LINK"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.trello.com/1/cards/$SHORT_LINK/attachments" \
              -d "key=$TRELLO_API_KEY" \
              -d "token=$TRELLO_TOKEN" \
              --data-urlencode "url=$PR_URL" \
              --data-urlencode "name=$PR_TITLE")
            echo "  → HTTP $STATUS"
          done
